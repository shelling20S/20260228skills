<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案18: 水墨 — MO-GI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sumi: #1a1a1a;
      --sumi-light: #3a3a3a;
      --washi: #f5f0e8;
      --washi-dark: #e8e0d0;
      --red: #c41e3a;
      --red-light: rgba(196, 30, 58, 0.12);
      --gray: #8a8278;
      --gray-light: #b5ada3;
    }

    body {
      background: #2a2520;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Shippori Mincho', serif;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: var(--washi);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* 和紙テクスチャ */
    .phone-frame::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    .container {
      padding: 56px 28px 48px;
      position: relative;
      z-index: 2;
    }

    /* 朱印マーク */
    .seal {
      position: absolute;
      top: 52px;
      right: 28px;
      width: 44px;
      height: 44px;
      border: 2.5px solid var(--red);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Zen Old Mincho', serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--red);
      transform: rotate(-8deg);
      opacity: 0.85;
      line-height: 1;
    }

    /* タイトル */
    .title-area {
      margin-bottom: 20px;
    }

    .title-jp {
      font-family: 'Zen Old Mincho', serif;
      font-size: 42px;
      font-weight: 900;
      color: var(--sumi);
      letter-spacing: 6px;
      line-height: 1.2;
      position: relative;
      display: inline-block;
    }

    /* 筆の払い風の装飾線 */
    .title-jp::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--sumi) 0%, var(--sumi) 60%, transparent 100%);
      border-radius: 0 2px 2px 0;
    }

    .title-en {
      font-family: 'Zen Old Mincho', serif;
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 4px;
      margin-top: 16px;
    }

    /* 墨の線 */
    .ink-line {
      margin: 32px 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--sumi) 15%,
        var(--sumi) 40%,
        var(--gray-light) 70%,
        transparent 100%
      );
      opacity: 0.25;
    }

    /* キャッチコピー */
    .catchcopy {
      font-family: 'Zen Old Mincho', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--sumi);
      margin-bottom: 40px;
      line-height: 2.4;
      letter-spacing: 2px;
    }

    .catchcopy .gal {
      color: var(--red);
      font-weight: 900;
      border-bottom: 2px solid var(--red);
      padding-bottom: 1px;
    }

    .catchcopy .bracket {
      color: var(--gray-light);
      font-weight: 400;
    }

    /* セクション */
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-label .jp {
      font-family: 'Zen Old Mincho', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--sumi);
      letter-spacing: 4px;
    }

    .section-label .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gray-light), transparent);
    }

    /* キャラクター — 縦書き風レイアウト */
    .characters {
      display: flex;
      justify-content: space-between;
      margin-bottom: 44px;
      padding: 0 4px;
    }

    .char-item {
      text-align: center;
      cursor: pointer;
      position: relative;
      flex: 1;
    }

    .char-symbol {
      width: 48px;
      height: 48px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border-radius: 50%;
      transition: all 0.4s ease;
      position: relative;
    }

    /* 墨の円（えんそう）風 */
    .char-symbol::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid var(--sumi);
      border-radius: 50%;
      opacity: 0.15;
      transition: all 0.4s ease;
    }

    .char-item:hover .char-symbol::before {
      opacity: 0.5;
      transform: scale(1.15);
    }

    .char-item.moe .char-symbol { color: var(--red); }
    .char-item.tech .char-symbol { color: #2e5984; }
    .char-item.guard .char-symbol { color: #3a6b4e; }
    .char-item.chair .char-symbol { color: #8b6914; }
    .char-item.gal .char-symbol { color: var(--red); }

    .char-name {
      font-family: 'Zen Old Mincho', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--sumi);
      letter-spacing: 2px;
    }

    .char-role {
      font-size: 9px;
      color: var(--gray);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ツールチップ */
    .char-item .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--sumi);
      color: var(--washi);
      font-size: 10px;
      padding: 8px 14px;
      white-space: nowrap;
      z-index: 10;
      letter-spacing: 1px;
    }

    .char-item .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--sumi);
    }

    .char-item:hover .tooltip { display: block; }

    /* シナリオ */
    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 44px;
    }

    .scenario-card {
      padding: 18px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: baseline;
      gap: 16px;
      position: relative;
    }

    .scenario-card:first-child {
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .scenario-card:hover {
      padding-left: 8px;
      background: var(--red-light);
    }

    .scenario-num {
      font-family: 'Zen Old Mincho', serif;
      font-size: 11px;
      font-weight: 400;
      color: var(--gray);
      flex-shrink: 0;
      min-width: 20px;
    }

    .scenario-text {
      font-family: 'Zen Old Mincho', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--sumi);
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    .scenario-arrow {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--gray-light);
      transition: all 0.3s;
    }

    .scenario-card:hover .scenario-arrow {
      color: var(--red);
      transform: translateY(-50%) translateX(4px);
    }

    /* フッター */
    .footer {
      text-align: center;
    }

    .footer-text {
      font-family: 'Zen Old Mincho', serif;
      font-size: 10px;
      color: var(--gray-light);
      letter-spacing: 4px;
    }

    /* フェードイン */
    .fade-in {
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }
    .fade-in:nth-child(1) { animation-delay: 0.2s; }
    .fade-in:nth-child(2) { animation-delay: 0.4s; }
    .fade-in:nth-child(3) { animation-delay: 0.6s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* スクロールバー */
    .phone-frame::-webkit-scrollbar { width: 3px; }
    .phone-frame::-webkit-scrollbar-thumb {
      background: var(--gray-light);
    }
    .phone-frame::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="container">

      <!-- 朱印 -->
      <div class="seal">萌<br>議</div>

      <!-- タイトル -->
      <div class="title-area">
        <div class="title-jp">萌議</div>
        <div class="title-en">MO-GI DECISION MAKING SYSTEM</div>
      </div>

      <div class="ink-line"></div>

      <!-- キャッチコピー -->
      <div class="catchcopy">
        <span class="bracket">「</span><span class="gal">GAL</span>が五人で会議したら<br>　こうなる。<span class="bracket">」</span>
      </div>

      <!-- メンバー -->
      <div class="section-label">
        <span class="jp">成　員</span>
        <span class="line"></span>
      </div>
      <div class="characters">
        <div class="char-item moe">
          <div class="tooltip">共感翻訳 / 萌コア</div>
          <div class="char-symbol">♥</div>
          <div class="char-name">モカ</div>
          <div class="char-role">萌</div>
        </div>
        <div class="char-item tech">
          <div class="tooltip">ファクト警察 / 技コア</div>
          <div class="char-symbol">⚗</div>
          <div class="char-name">リツ</div>
          <div class="char-role">技</div>
        </div>
        <div class="char-item guard">
          <div class="tooltip">炎上予防装置 / 守コア</div>
          <div class="char-symbol">◇</div>
          <div class="char-name">カノン</div>
          <div class="char-role">守</div>
        </div>
        <div class="char-item chair">
          <div class="tooltip">結論製造機 / 統括</div>
          <div class="char-symbol">♛</div>
          <div class="char-name">レイカ</div>
          <div class="char-role">長</div>
        </div>
        <div class="char-item gal">
          <div class="tooltip">バズ製造姫 / ギャル</div>
          <div class="char-symbol">★</div>
          <div class="char-name">ルナ</div>
          <div class="char-role">GAL</div>
        </div>
      </div>

      <!-- シナリオ -->
      <div class="section-label">
        <span class="jp">議　題</span>
        <span class="line"></span>
      </div>
      <div class="scenario-list">
        <div class="scenario-card fade-in">
          <div class="scenario-num">壱</div>
          <div class="scenario-text">副業でAIサービスを始めるべき？</div>
          <div class="scenario-arrow">→</div>
        </div>
        <div class="scenario-card fade-in">
          <div class="scenario-num">弐</div>
          <div class="scenario-text">社内データをClaude APIに渡していい？</div>
          <div class="scenario-arrow">→</div>
        </div>
        <div class="scenario-card fade-in">
          <div class="scenario-num">参</div>
          <div class="scenario-text">勉強会をYouTubeで公開配信すべき？</div>
          <div class="scenario-arrow">→</div>
        </div>
      </div>

      <!-- フッター -->
      <div class="footer">
        <div class="footer-text">萌 議 — 壱 ・ 零</div>
      </div>

    </div>
  </div>
</body>
</html>
