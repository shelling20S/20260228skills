<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案15: リキッドグラス — MO-GI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* 流動的なグラデーション背景 */
    .liquid-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .liquid-bg .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      animation: float 8s ease-in-out infinite;
    }

    .liquid-bg .blob-1 {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      top: -50px;
      left: -50px;
      animation-delay: 0s;
    }

    .liquid-bg .blob-2 {
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      top: 200px;
      right: -40px;
      animation-delay: -2s;
    }

    .liquid-bg .blob-3 {
      width: 160px;
      height: 160px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      bottom: 100px;
      left: -30px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -20px) scale(1.05); }
      50% { transform: translate(-10px, 15px) scale(0.95); }
      75% { transform: translate(15px, 10px) scale(1.02); }
    }

    .container {
      padding: 48px 24px 40px;
      position: relative;
      z-index: 2;
    }

    /* グラスカード */
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      transition: all 0.4s ease;
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* タイトルカード */
    .title-card {
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
    }

    .title {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 2px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .title i {
      font-size: 24px;
      color: #a78bfa;
    }

    .title .moe {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title .gi {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
      margin-top: 12px;
      text-transform: uppercase;
    }

    /* キャッチコピー */
    .catchcopy-card {
      padding: 24px;
      text-align: center;
      margin-bottom: 24px;
    }

    .catchcopy-card p {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.85);
      line-height: 2;
      letter-spacing: 1px;
    }

    .catchcopy-card .gal {
      color: #f5576c;
      font-weight: 500;
    }

    /* セクションラベル */
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    /* キャラクターグリッド */
    .char-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .char-item {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 16px 12px;
      width: 64px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .char-item:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-4px);
    }

    .char-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin: 0 auto 8px;
      color: #fff;
    }

    .char-item.moe .char-icon { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .char-item.tech .char-icon { background: linear-gradient(135deg, #667eea, #764ba2); }
    .char-item.guard .char-icon { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .char-item.chair .char-icon { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .char-item.gal .char-icon { background: linear-gradient(135deg, #eb3349, #f45c43); }

    .char-name {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
    }

    /* ツールチップ */
    .char-item .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      white-space: nowrap;
      z-index: 10;
    }

    .char-item:hover .tooltip { display: block; }

    /* シナリオカード */
    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .scenario-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .scenario-card:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateX(4px);
    }

    .scenario-num {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .scenario-text {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
      padding-right: 24px;
    }

    .scenario-arrow {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 18px;
      transition: all 0.3s;
    }

    .scenario-card:hover .scenario-arrow {
      color: rgba(255, 255, 255, 0.6);
      transform: translateY(-50%) translateX(4px);
    }

    /* フッター */
    .footer {
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 4px;
    }

    /* アニメーション */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    .fade-up:nth-child(1) { animation-delay: 0.1s; }
    .fade-up:nth-child(2) { animation-delay: 0.2s; }
    .fade-up:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* スクロールバー */
    .phone-frame::-webkit-scrollbar { width: 3px; }
    .phone-frame::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="liquid-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <div class="container">

      <!-- タイトル -->
      <div class="glass-card title-card">
        <div class="title">
          <i class="ph ph-play"></i>
          <span class="moe">萌</span><span class="gi">GI</span> SYSTEM
        </div>
        <div class="subtitle">MO-GI Decision Making System</div>
      </div>

      <!-- キャッチコピー -->
      <div class="glass-card catchcopy-card">
        <p>「<span class="gal">GAL</span>が5人で会議したら<br>こうなる。」</p>
      </div>

      <!-- キャラクター -->
      <div class="section-label">Members</div>
      <div class="char-grid">
        <div class="char-item moe">
          <div class="tooltip">共感翻訳 / 萌コア</div>
          <div class="char-icon"><i class="ph ph-heart"></i></div>
          <div class="char-name">モカ</div>
        </div>
        <div class="char-item tech">
          <div class="tooltip">ファクト警察 / 技コア</div>
          <div class="char-icon"><i class="ph ph-flask"></i></div>
          <div class="char-name">リツ</div>
        </div>
        <div class="char-item guard">
          <div class="tooltip">炎上予防装置 / 守コア</div>
          <div class="char-icon"><i class="ph ph-shield"></i></div>
          <div class="char-name">カノン</div>
        </div>
        <div class="char-item chair">
          <div class="tooltip">結論製造機 / 統括</div>
          <div class="char-icon"><i class="ph ph-crown"></i></div>
          <div class="char-name">レイカ</div>
        </div>
        <div class="char-item gal">
          <div class="tooltip">バズ製造姫 / ギャル</div>
          <div class="char-icon"><i class="ph ph-star"></i></div>
          <div class="char-name">ルナ</div>
        </div>
      </div>

      <!-- シナリオ -->
      <div class="section-label">Scenarios</div>
      <div class="scenario-list">
        <div class="scenario-card fade-up">
          <div class="scenario-num">SCENARIO 01</div>
          <div class="scenario-text">副業でAIサービスを始めるべき？</div>
          <div class="scenario-arrow"><i class="ph ph-arrow-right"></i></div>
        </div>
        <div class="scenario-card fade-up">
          <div class="scenario-num">SCENARIO 02</div>
          <div class="scenario-text">社内データをClaude APIに渡していい？</div>
          <div class="scenario-arrow"><i class="ph ph-arrow-right"></i></div>
        </div>
        <div class="scenario-card fade-up">
          <div class="scenario-num">SCENARIO 03</div>
          <div class="scenario-text">勉強会をYouTubeで公開配信すべき？</div>
          <div class="scenario-arrow"><i class="ph ph-arrow-right"></i></div>
        </div>
      </div>

      <!-- フッター -->
      <div class="footer">MO-GI v1.0</div>

    </div>
  </div>
</body>
</html>
