<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案28: 四季 — MO-GI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&family=Kaisei+Opti:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* ===================================================
       CSS CUSTOM PROPERTIES — 季節ごとに全切替
       =================================================== */

    /* 春 — 桜 */
    .phone-frame[data-season="spring"] {
      --bg-1: #fff5f8;
      --bg-2: #fce4ec;
      --bg-3: #f8e8f0;
      --accent: #e8729a;
      --accent-light: #f4a0b8;
      --accent-glow: rgba(232, 114, 154, 0.2);
      --accent-sub: #c06888;
      --text: #5a3040;
      --text-light: #9a7080;
      --text-dim: #c4a0b0;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(232, 114, 154, 0.2);
      --divider: rgba(232, 114, 154, 0.15);
      --particle-1: #f4a0b8;
      --particle-2: #fce4ec;
      --particle-3: #e8729a;
      --season-font: 'Shippori Mincho', serif;
      --season-icon: "🌸";
      --season-label: "春 — HARU";
    }

    /* 夏 — 海 */
    .phone-frame[data-season="summer"] {
      --bg-1: #e8f8ff;
      --bg-2: #c8ecff;
      --bg-3: #b0e0f8;
      --accent: #0891b2;
      --accent-light: #22d3ee;
      --accent-glow: rgba(8, 145, 178, 0.2);
      --accent-sub: #0e7490;
      --text: #164e63;
      --text-light: #3a8a9a;
      --text-dim: #80b8c8;
      --card-bg: rgba(255, 255, 255, 0.65);
      --card-border: rgba(8, 145, 178, 0.2);
      --divider: rgba(8, 145, 178, 0.15);
      --particle-1: #22d3ee;
      --particle-2: #fbbf24;
      --particle-3: #a5f3fc;
      --season-font: 'Noto Sans JP', sans-serif;
      --season-icon: "🌊";
      --season-label: "夏 — NATSU";
    }

    /* 秋 — 紅葉 */
    .phone-frame[data-season="autumn"] {
      --bg-1: #fdf6ee;
      --bg-2: #f5e6d0;
      --bg-3: #ecdcc4;
      --accent: #c2410c;
      --accent-light: #ea580c;
      --accent-glow: rgba(194, 65, 12, 0.2);
      --accent-sub: #9a3412;
      --text: #431407;
      --text-light: #78350f;
      --text-dim: #b8946a;
      --card-bg: rgba(255, 252, 245, 0.75);
      --card-border: rgba(194, 65, 12, 0.15);
      --divider: rgba(194, 65, 12, 0.12);
      --particle-1: #ea580c;
      --particle-2: #ca8a04;
      --particle-3: #dc2626;
      --season-font: 'Kaisei Opti', serif;
      --season-icon: "🍁";
      --season-label: "秋 — AKI";
    }

    /* 冬 — 雪 */
    .phone-frame[data-season="winter"] {
      --bg-1: #f0f4f8;
      --bg-2: #e2e8f0;
      --bg-3: #dae2ea;
      --accent: #475569;
      --accent-light: #94a3b8;
      --accent-glow: rgba(71, 85, 105, 0.15);
      --accent-sub: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --text-dim: #a0aec0;
      --card-bg: rgba(255, 255, 255, 0.6);
      --card-border: rgba(71, 85, 105, 0.12);
      --divider: rgba(71, 85, 105, 0.1);
      --particle-1: #e2e8f0;
      --particle-2: #cbd5e1;
      --particle-3: #ffffff;
      --season-font: 'Zen Old Mincho', serif;
      --season-icon: "❄️";
      --season-label: "冬 — FUYU";
    }

    /* ===================================================
       共通レイアウト
       =================================================== */
    .phone-frame {
      width: 375px;
      height: 812px;
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      transition: background 0.8s ease;
      border-radius: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }

    /* パーティクルキャンバス */
    .particle-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .container {
      padding: 48px 24px 40px;
      position: relative;
      z-index: 2;
    }

    /* ===== 季節セレクター ===== */
    .season-switcher {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
    }

    .season-btn {
      width: 44px;
      height: 44px;
      border: 2px solid var(--card-border);
      border-radius: 50%;
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
    }

    .season-btn:hover {
      transform: scale(1.1);
      border-color: var(--accent);
    }

    .season-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow), 0 2px 8px var(--accent-glow);
      transform: scale(1.05);
    }

    .season-btn.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .season-btn .label {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 10px;
      color: var(--text);
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--card-border);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .season-btn:hover .label { display: block; }

    /* ===== タイトル ===== */
    .title-area {
      text-align: center;
      margin-bottom: 8px;
    }

    .season-icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
      animation: gentleFloat 3s ease-in-out infinite;
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .title {
      font-family: var(--season-font);
      font-size: 36px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 4px;
      line-height: 1.2;
      transition: font-family 0.4s;
    }

    .title .gi {
      color: var(--accent);
    }

    .subtitle {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 4px;
      margin-top: 12px;
      text-transform: uppercase;
    }

    /* 季節ラベル */
    .season-tag {
      display: inline-block;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 3px;
      margin-top: 10px;
      padding: 3px 14px;
      border: 1px solid var(--accent-glow);
      border-radius: 20px;
      background: var(--card-bg);
      backdrop-filter: blur(4px);
    }

    /* ===== ディバイダー ===== */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--divider), var(--divider), transparent);
      margin: 24px 0;
    }

    /* ===== キャッチコピー ===== */
    .catchcopy {
      text-align: center;
      font-family: var(--season-font);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 32px;
      line-height: 2.2;
      letter-spacing: 1px;
      transition: font-family 0.4s;
    }

    .catchcopy .gal {
      color: var(--accent);
      font-weight: 900;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 1px;
    }

    /* ===== セクションラベル ===== */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 3px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--divider), transparent);
    }

    /* ===== キャラクター ===== */
    .characters {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 32px;
    }

    .char-item {
      flex: 1;
      text-align: center;
      cursor: pointer;
      position: relative;
    }

    .char-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin: 0 auto 8px;
      background: var(--card-bg);
      backdrop-filter: blur(6px);
      border: 2px solid var(--card-border);
      transition: all 0.3s ease;
      color: var(--accent);
    }

    .char-item:hover .char-circle {
      border-color: var(--accent);
      transform: scale(1.1) translateY(-3px);
      box-shadow: 0 6px 16px var(--accent-glow);
    }

    .char-name {
      font-family: var(--season-font);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }

    .char-role {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 2px;
      letter-spacing: 1px;
    }

    /* ツールチップ */
    .char-item .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      color: var(--text);
      font-size: 10px;
      padding: 6px 12px;
      white-space: nowrap;
      z-index: 10;
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .char-item:hover .tooltip { display: block; }

    /* ===== シナリオ ===== */
    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
    }

    .scenario-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .scenario-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 3px 0 0 3px;
    }

    .scenario-card:hover {
      border-color: var(--accent-light);
      transform: translateX(4px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .scenario-card:hover::before { opacity: 1; }

    .scenario-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .scenario-text {
      font-family: var(--season-font);
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      padding-right: 24px;
    }

    .scenario-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-dim);
      transition: all 0.3s;
    }

    .scenario-card:hover .scenario-arrow {
      color: var(--accent);
      transform: translateY(-50%) translateX(3px);
    }

    /* ===== フッター ===== */
    .footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
    }

    /* ===== パーティクル個別スタイル ===== */
    .falling {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      will-change: transform;
    }

    /* スクロールバー */
    .phone-frame::-webkit-scrollbar { width: 4px; }
    .phone-frame::-webkit-scrollbar-thumb {
      background: var(--accent-light);
      border-radius: 4px;
    }
    .phone-frame::-webkit-scrollbar-track { background: transparent; }

    /* フェードイン */
    .fade-up {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .fade-up:nth-child(1) { animation-delay: 0.1s; }
    .fade-up:nth-child(2) { animation-delay: 0.2s; }
    .fade-up:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-season="spring" id="phone">
    <div class="particle-canvas" id="particleCanvas"></div>
    <div class="container">

      <!-- 季節セレクター -->
      <div class="season-switcher">
        <button class="season-btn active" data-s="spring" onclick="setSeason('spring')">
          🌸
          <span class="label">春 HARU</span>
        </button>
        <button class="season-btn" data-s="summer" onclick="setSeason('summer')">
          🌊
          <span class="label">夏 NATSU</span>
        </button>
        <button class="season-btn" data-s="autumn" onclick="setSeason('autumn')">
          🍁
          <span class="label">秋 AKI</span>
        </button>
        <button class="season-btn" data-s="winter" onclick="setSeason('winter')">
          ❄️
          <span class="label">冬 FUYU</span>
        </button>
      </div>

      <!-- タイトル -->
      <div class="title-area">
        <span class="season-icon" id="seasonIcon">🌸</span>
        <div class="title">萌<span class="gi">GI</span></div>
        <div class="subtitle">MO-GI Decision Making System</div>
        <div class="season-tag" id="seasonTag">春 — HARU</div>
      </div>

      <div class="divider"></div>

      <!-- キャッチコピー -->
      <div class="catchcopy">
        「<span class="gal">GAL</span>が5人で会議したら<br>こうなる。」
      </div>

      <!-- メンバー -->
      <div class="section-label">成　員</div>
      <div class="characters">
        <div class="char-item">
          <div class="tooltip">共感翻訳 / 萌コア</div>
          <div class="char-circle">♥</div>
          <div class="char-name">モカ</div>
          <div class="char-role">萌</div>
        </div>
        <div class="char-item">
          <div class="tooltip">ファクト警察 / 技コア</div>
          <div class="char-circle">⚗</div>
          <div class="char-name">リツ</div>
          <div class="char-role">技</div>
        </div>
        <div class="char-item">
          <div class="tooltip">炎上予防装置 / 守コア</div>
          <div class="char-circle">◇</div>
          <div class="char-name">カノン</div>
          <div class="char-role">守</div>
        </div>
        <div class="char-item">
          <div class="tooltip">結論製造機 / 統括</div>
          <div class="char-circle">♛</div>
          <div class="char-name">レイカ</div>
          <div class="char-role">長</div>
        </div>
        <div class="char-item">
          <div class="tooltip">バズ製造姫 / ギャル</div>
          <div class="char-circle">★</div>
          <div class="char-name">ルナ</div>
          <div class="char-role">GAL</div>
        </div>
      </div>

      <!-- シナリオ -->
      <div class="section-label">議　題</div>
      <div class="scenario-list">
        <div class="scenario-card fade-up">
          <div class="scenario-num">SCENARIO 01</div>
          <div class="scenario-text">副業でAIサービスを始めるべき？</div>
          <div class="scenario-arrow">→</div>
        </div>
        <div class="scenario-card fade-up">
          <div class="scenario-num">SCENARIO 02</div>
          <div class="scenario-text">社内データをClaude APIに渡していい？</div>
          <div class="scenario-arrow">→</div>
        </div>
        <div class="scenario-card fade-up">
          <div class="scenario-num">SCENARIO 03</div>
          <div class="scenario-text">勉強会をYouTubeで公開配信すべき？</div>
          <div class="scenario-arrow">→</div>
        </div>
      </div>

      <!-- フッター -->
      <div class="footer">萌議 — v1.0</div>

    </div>
  </div>

  <script>
    // ===== 季節定義 =====
    const SEASONS = {
      spring: { icon: '🌸', label: '春 — HARU',   particles: ['🌸', '💮', '✿'] },
      summer: { icon: '🌊', label: '夏 — NATSU',  particles: ['✦', '○', '·'] },
      autumn: { icon: '🍁', label: '秋 — AKI',    particles: ['🍁', '🍂', '🍃'] },
      winter: { icon: '❄️', label: '冬 — FUYU',   particles: ['❄', '✧', '·'] },
    };

    const phone = document.getElementById('phone');
    const canvas = document.getElementById('particleCanvas');
    const seasonIcon = document.getElementById('seasonIcon');
    const seasonTag = document.getElementById('seasonTag');
    let animFrame;
    let particles = [];

    // ===== 自動検出 =====
    function detectSeason() {
      const m = new Date().getMonth(); // 0-11
      if (m >= 2 && m <= 4) return 'spring';
      if (m >= 5 && m <= 7) return 'summer';
      if (m >= 8 && m <= 10) return 'autumn';
      return 'winter';
    }

    // ===== 季節切替 =====
    function setSeason(s) {
      phone.setAttribute('data-season', s);
      seasonIcon.textContent = SEASONS[s].icon;
      seasonTag.textContent = SEASONS[s].label;

      // ボタン状態
      document.querySelectorAll('.season-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.s === s);
      });

      // パーティクルリセット
      resetParticles(s);
    }

    // ===== パーティクルシステム =====
    class Particle {
      constructor(season) {
        const cfg = SEASONS[season];
        this.el = document.createElement('div');
        this.el.className = 'falling';
        this.el.textContent = cfg.particles[Math.floor(Math.random() * cfg.particles.length)];

        // 季節ごとのスタイル分岐
        if (season === 'summer') {
          // 夏：光の粒が漂う
          this.el.style.cssText = `
            font-size: ${4 + Math.random() * 8}px;
            color: var(--particle-${1 + Math.floor(Math.random() * 3)});
            opacity: 0;
          `;
          this.x = Math.random() * 375;
          this.y = Math.random() * 812;
          this.speedY = -0.15 - Math.random() * 0.2;
          this.speedX = (Math.random() - 0.5) * 0.3;
          this.phase = Math.random() * Math.PI * 2;
          this.maxOpacity = 0.3 + Math.random() * 0.4;
          this.type = 'float';
        } else if (season === 'winter') {
          // 冬：雪がゆっくり降る
          this.el.style.cssText = `
            font-size: ${6 + Math.random() * 10}px;
            color: var(--particle-${1 + Math.floor(Math.random() * 3)});
            opacity: ${0.3 + Math.random() * 0.5};
          `;
          this.x = Math.random() * 375;
          this.y = -20 - Math.random() * 100;
          this.speedY = 0.3 + Math.random() * 0.4;
          this.speedX = (Math.random() - 0.5) * 0.4;
          this.wobbleAmp = 0.3 + Math.random() * 0.5;
          this.wobbleSpeed = 0.01 + Math.random() * 0.015;
          this.phase = Math.random() * Math.PI * 2;
          this.type = 'snow';
        } else if (season === 'autumn') {
          // 秋：葉が揺れながら落ちる
          this.el.style.cssText = `
            font-size: ${10 + Math.random() * 8}px;
            opacity: ${0.5 + Math.random() * 0.4};
          `;
          this.x = Math.random() * 375;
          this.y = -30 - Math.random() * 120;
          this.speedY = 0.4 + Math.random() * 0.5;
          this.speedX = 0.2 + Math.random() * 0.4;
          this.wobbleAmp = 1 + Math.random() * 1.5;
          this.wobbleSpeed = 0.008 + Math.random() * 0.012;
          this.rotSpeed = (Math.random() - 0.5) * 3;
          this.rot = Math.random() * 360;
          this.phase = Math.random() * Math.PI * 2;
          this.type = 'leaf';
        } else {
          // 春：花びらがひらひら
          this.el.style.cssText = `
            font-size: ${10 + Math.random() * 8}px;
            opacity: ${0.4 + Math.random() * 0.4};
          `;
          this.x = Math.random() * 375;
          this.y = -20 - Math.random() * 100;
          this.speedY = 0.5 + Math.random() * 0.5;
          this.speedX = 0.3 + Math.random() * 0.5;
          this.wobbleAmp = 1 + Math.random() * 2;
          this.wobbleSpeed = 0.01 + Math.random() * 0.015;
          this.rotSpeed = (Math.random() - 0.5) * 2;
          this.rot = Math.random() * 360;
          this.phase = Math.random() * Math.PI * 2;
          this.type = 'petal';
        }

        this.el.style.position = 'absolute';
        this.tick = 0;
        canvas.appendChild(this.el);
      }

      update() {
        this.tick++;

        if (this.type === 'float') {
          this.y += this.speedY;
          this.x += this.speedX + Math.sin(this.tick * 0.02 + this.phase) * 0.2;
          const cycle = Math.sin(this.tick * 0.015 + this.phase);
          this.el.style.opacity = this.maxOpacity * Math.max(0, cycle);
          if (this.y < -40) { this.y = 820; this.x = Math.random() * 375; }
        } else if (this.type === 'snow') {
          this.y += this.speedY;
          this.x += this.speedX + Math.sin(this.tick * this.wobbleSpeed + this.phase) * this.wobbleAmp;
          if (this.y > 820) { this.y = -20; this.x = Math.random() * 375; }
        } else {
          // petal & leaf
          this.y += this.speedY;
          this.x += this.speedX + Math.sin(this.tick * this.wobbleSpeed + this.phase) * this.wobbleAmp;
          this.rot += this.rotSpeed;
          this.el.style.transform = `rotate(${this.rot}deg)`;
          if (this.y > 820 || this.x > 400) {
            this.y = -30;
            this.x = Math.random() * 375;
          }
        }

        this.el.style.left = this.x + 'px';
        this.el.style.top = this.y + 'px';
      }

      remove() {
        this.el.remove();
      }
    }

    function resetParticles(season) {
      if (animFrame) cancelAnimationFrame(animFrame);
      particles.forEach(p => p.remove());
      particles = [];
      canvas.innerHTML = '';

      const count = season === 'summer' ? 20 : 15;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(season));
      }
      animate();
    }

    function animate() {
      particles.forEach(p => p.update());
      animFrame = requestAnimationFrame(animate);
    }

    // ===== 初期化 =====
    const detected = detectSeason();
    setSeason(detected);
  </script>
</body>
</html>
