<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案12: ヴェイパーウェーブ — MO-GI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Megrim&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: linear-gradient(180deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* グリッド背景 */
    .grid-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 107, 178, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 107, 178, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      perspective: 500px;
      pointer-events: none;
      z-index: 0;
    }

    .grid-bg::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background:
        linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      transform: rotateX(60deg);
      transform-origin: bottom;
    }

    /* サンセットグラデーション */
    .sunset {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(
        180deg,
        rgba(255, 107, 178, 0.3) 0%,
        rgba(255, 167, 38, 0.2) 30%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      padding: 48px 24px 40px;
      position: relative;
      z-index: 2;
    }

    /* タイトル */
    .title-area {
      text-align: center;
      margin-bottom: 24px;
    }

    .title {
      font-family: 'Megrim', cursive;
      font-size: 38px;
      letter-spacing: 6px;
      position: relative;
      display: inline-block;
    }

    .title .text {
      background: linear-gradient(90deg, #ff6bb2, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title ion-icon {
      font-size: 28px;
      color: #ff6bb2;
      vertical-align: middle;
      margin-right: 4px;
      filter: drop-shadow(0 0 8px #ff6bb2);
    }

    /* クロームテキスト効果 */
    .title::after {
      content: '萌GI SYSTEM';
      position: absolute;
      top: 2px;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, rgba(255,107,178,0.3), rgba(0,255,255,0.3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(4px);
      pointer-events: none;
    }

    .subtitle {
      font-family: 'Megrim', cursive;
      font-size: 10px;
      color: #00ffff;
      letter-spacing: 8px;
      margin-top: 12px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #00ffff;
    }

    /* 区切り線 */
    .divider {
      height: 2px;
      margin: 28px 0;
      background: linear-gradient(90deg, transparent, #ff6bb2, #00ffff, transparent);
    }

    /* キャッチコピー */
    .catchcopy {
      text-align: center;
      font-size: 15px;
      color: #fff;
      margin-bottom: 36px;
      line-height: 2;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 107, 178, 0.5);
    }

    .catchcopy .gal {
      color: #ff6bb2;
      font-weight: 500;
    }

    /* セクションラベル */
    .section-label {
      font-family: 'Megrim', cursive;
      font-size: 11px;
      color: #00ffff;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 10px #00ffff;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00ffff50, transparent);
    }

    /* シナリオカード */
    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 40px;
    }

    .scenario-card {
      background: linear-gradient(135deg, rgba(255, 107, 178, 0.1), rgba(0, 255, 255, 0.1));
      border: 1px solid rgba(255, 107, 178, 0.3);
      border-radius: 0;
      padding: 18px 20px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }

    .scenario-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 107, 178, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .scenario-card:hover {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(255, 107, 178, 0.2);
      transform: translateY(-2px);
    }

    .scenario-card:hover::before {
      opacity: 1;
    }

    .scenario-number {
      font-family: 'Megrim', cursive;
      font-size: 10px;
      color: #ff6bb2;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 0 0 5px #ff6bb2;
    }

    .scenario-title {
      font-size: 14px;
      color: #fff;
      line-height: 1.7;
      letter-spacing: 1px;
      padding-right: 24px;
    }

    .scenario-arrow {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #00ffff;
      opacity: 0.3;
      transition: all 0.3s;
    }

    .scenario-card:hover .scenario-arrow {
      opacity: 1;
      transform: translateY(-50%) translateX(4px);
    }

    /* キャラクター */
    .characters {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 44px;
    }

    .char-item {
      text-align: center;
      cursor: pointer;
      position: relative;
    }

    .char-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: linear-gradient(135deg, rgba(255, 107, 178, 0.2), rgba(0, 255, 255, 0.2));
      border: 2px solid;
      transition: all 0.3s ease;
    }

    .char-icon:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px currentColor;
    }

    .char-icon.moe { border-color: #ff6bb2; color: #ff6bb2; }
    .char-icon.tech { border-color: #00ffff; color: #00ffff; }
    .char-icon.guard { border-color: #7fff7f; color: #7fff7f; }
    .char-icon.chair { border-color: #ffcc00; color: #ffcc00; }
    .char-icon.gal { border-color: #ff9966; color: #ff9966; }

    .char-name {
      font-family: 'Megrim', cursive;
      font-size: 11px;
      color: #fff;
      margin-top: 10px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    /* ツールチップ */
    .char-item .tooltip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1a0a2e, #16213e);
      border: 1px solid #ff6bb2;
      color: #fff;
      font-size: 10px;
      padding: 8px 14px;
      white-space: nowrap;
      margin-bottom: 10px;
      z-index: 10;
      letter-spacing: 1px;
    }

    .char-item .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #ff6bb2;
    }

    .char-item:hover .tooltip { display: block; }

    /* フッター */
    .footer {
      text-align: center;
      font-family: 'Megrim', cursive;
      font-size: 10px;
      color: #00ffff;
      letter-spacing: 6px;
      opacity: 0.4;
      text-shadow: 0 0 5px #00ffff;
    }

    /* アニメーション */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }
    .fade-in:nth-child(1) { animation-delay: 0.15s; }
    .fade-in:nth-child(2) { animation-delay: 0.3s; }
    .fade-in:nth-child(3) { animation-delay: 0.45s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* スクロールバー */
    .phone-frame::-webkit-scrollbar { width: 3px; }
    .phone-frame::-webkit-scrollbar-thumb {
      background: linear-gradient(#ff6bb2, #00ffff);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="grid-bg"></div>
    <div class="sunset"></div>
    <div class="container">

      <!-- タイトル -->
      <div class="title-area">
        <div class="title">
          <ion-icon name="play"></ion-icon>
          <span class="text">萌GI SYSTEM</span>
        </div>
        <div class="subtitle">MO-GI Decision Making System</div>
      </div>

      <div class="divider"></div>

      <!-- キャッチコピー -->
      <div class="catchcopy">
        「<span class="gal">GAL</span>が5人で会議したら<br>こうなる。」
      </div>

      <!-- シナリオ -->
      <div class="section-label">Scenarios</div>
      <div class="scenario-list">
        <div class="scenario-card fade-in">
          <div class="scenario-number">SCENARIO 01</div>
          <div class="scenario-title">副業でAIサービスを始めるべき？</div>
          <div class="scenario-arrow"><ion-icon name="chevron-forward"></ion-icon></div>
        </div>
        <div class="scenario-card fade-in">
          <div class="scenario-number">SCENARIO 02</div>
          <div class="scenario-title">社内データをClaude APIに渡していい？</div>
          <div class="scenario-arrow"><ion-icon name="chevron-forward"></ion-icon></div>
        </div>
        <div class="scenario-card fade-in">
          <div class="scenario-number">SCENARIO 03</div>
          <div class="scenario-title">勉強会をYouTubeで公開配信すべき？</div>
          <div class="scenario-arrow"><ion-icon name="chevron-forward"></ion-icon></div>
        </div>
      </div>

      <!-- キャラクター -->
      <div class="section-label">Members</div>
      <div class="characters">
        <div class="char-item">
          <div class="tooltip">共感翻訳 / 萌コア</div>
          <div class="char-icon moe"><ion-icon name="heart"></ion-icon></div>
          <div class="char-name">モカ</div>
        </div>
        <div class="char-item">
          <div class="tooltip">ファクト警察 / 技コア</div>
          <div class="char-icon tech"><ion-icon name="flask"></ion-icon></div>
          <div class="char-name">リツ</div>
        </div>
        <div class="char-item">
          <div class="tooltip">炎上予防装置 / 守コア</div>
          <div class="char-icon guard"><ion-icon name="shield"></ion-icon></div>
          <div class="char-name">カノン</div>
        </div>
        <div class="char-item">
          <div class="tooltip">結論製造機 / 統括</div>
          <div class="char-icon chair"><ion-icon name="diamond"></ion-icon></div>
          <div class="char-name">レイカ</div>
        </div>
        <div class="char-item">
          <div class="tooltip">バズ製造姫 / ギャル</div>
          <div class="char-icon gal"><ion-icon name="star"></ion-icon></div>
          <div class="char-name">ルナ</div>
        </div>
      </div>

      <!-- フッター -->
      <div class="footer">MO-GI v1.0</div>

    </div>
  </div>
</body>
</html>
