<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案21: ブルータリスト — MO-GI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Courier+Prime:wght@400;700&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: #fff;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      border: 4px solid #000;
    }

    .container {
      padding: 0;
      position: relative;
    }

    /* ===== 巨大タイトルブロック ===== */
    .hero {
      background: #000;
      padding: 40px 16px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero .oversize {
      font-family: 'Anton', sans-serif;
      font-size: 96px;
      color: #fff;
      line-height: 0.82;
      letter-spacing: -4px;
      text-transform: uppercase;
      mix-blend-mode: normal;
    }

    .hero .oversize .gi {
      color: #000;
      -webkit-text-stroke: 2px #fff;
    }

    /* 斜めの赤テープ */
    .hero .tape {
      position: absolute;
      top: 28px;
      right: -20px;
      background: #ff0000;
      color: #fff;
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 40px;
      transform: rotate(-12deg);
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 5;
    }

    .hero .sub {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      color: #666;
      margin-top: 16px;
      letter-spacing: 2px;
      border-top: 1px solid #333;
      padding-top: 10px;
    }

    /* ===== はみ出すキャッチコピー ===== */
    .catch-block {
      padding: 28px 16px 20px;
      position: relative;
    }

    /* 巨大な背景文字 */
    .catch-block .bg-text {
      position: absolute;
      top: -10px;
      right: -10px;
      font-family: 'Anton', sans-serif;
      font-size: 140px;
      color: rgba(0,0,0,0.03);
      line-height: 1;
      pointer-events: none;
      letter-spacing: -6px;
    }

    .catchcopy {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #000;
      line-height: 2;
      letter-spacing: 1px;
      position: relative;
    }

    .catchcopy .gal {
      background: #ff0000;
      color: #fff;
      padding: 2px 8px;
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      transform: rotate(-2deg);
      display: inline-block;
    }

    /* ===== ずれたセクションラベル ===== */
    .section-label {
      font-family: 'Anton', sans-serif;
      font-size: 14px;
      color: #000;
      letter-spacing: 6px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-top: 4px solid #000;
      border-bottom: 1px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-label .count {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: #999;
      letter-spacing: 1px;
    }

    /* ===== キャラ — 重なるカード ===== */
    .char-stack {
      padding: 20px 16px 28px;
      display: flex;
      gap: 0;
      position: relative;
      min-height: 140px;
    }

    .char-card {
      position: absolute;
      width: 100px;
      background: #fff;
      border: 3px solid #000;
      padding: 14px 10px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 1;
    }

    .char-card:hover {
      z-index: 10 !important;
      transform: scale(1.12) !important;
      box-shadow: 8px 8px 0 #000;
    }

    .char-card:nth-child(1) { left: 8px; top: 20px; transform: rotate(-6deg); z-index: 5; }
    .char-card:nth-child(2) { left: 68px; top: 10px; transform: rotate(3deg); z-index: 4; }
    .char-card:nth-child(3) { left: 138px; top: 24px; transform: rotate(-2deg); z-index: 3; }
    .char-card:nth-child(4) { left: 200px; top: 8px; transform: rotate(5deg); z-index: 2; }
    .char-card:nth-child(5) { left: 262px; top: 18px; transform: rotate(-4deg); z-index: 1; background: #ff0000; border-color: #ff0000; }
    .char-card:nth-child(5) .char-name,
    .char-card:nth-child(5) .char-role { color: #fff; }
    .char-card:nth-child(5) .char-sym { color: #fff; }

    .char-sym {
      font-size: 26px;
      margin-bottom: 6px;
      display: block;
    }

    .char-card .char-name {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 900;
      color: #000;
      letter-spacing: 1px;
    }

    .char-card .char-role {
      font-family: 'Courier Prime', monospace;
      font-size: 8px;
      color: #999;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ===== シナリオ — 番号が暴れる ===== */
    .scenario-section {
      padding: 0 16px 28px;
    }

    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .scenario-card {
      padding: 16px 0;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .scenario-card:first-child {
      border-top: 1px solid #ddd;
    }

    .scenario-card:hover {
      background: #ff0000;
      padding-left: 12px;
      padding-right: 12px;
      margin-left: -12px;
      margin-right: -12px;
    }

    .scenario-card:hover .scenario-text,
    .scenario-card:hover .scenario-num {
      color: #fff;
    }

    .scenario-num {
      font-family: 'Anton', sans-serif;
      font-size: 36px;
      color: #000;
      line-height: 1;
      flex-shrink: 0;
      min-width: 40px;
      transition: color 0.15s;
    }

    .scenario-text {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #333;
      line-height: 1.7;
      padding-top: 8px;
      transition: color 0.15s;
    }

    .scenario-arrow {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Anton', sans-serif;
      font-size: 20px;
      color: #ccc;
      transition: all 0.15s;
    }

    .scenario-card:hover .scenario-arrow {
      color: #fff;
      transform: translateY(-50%) translateX(4px);
    }

    /* ===== フッター — 生テキスト ===== */
    .footer-raw {
      background: #000;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
    }

    .footer-raw span {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
    }

    .footer-raw .red { color: #ff0000; }

    /* ===== ランダムな装飾 ===== */
    .sticker {
      position: absolute;
      font-family: 'Anton', sans-serif;
      pointer-events: none;
    }

    .sticker-1 {
      top: 200px;
      right: 12px;
      font-size: 11px;
      color: #ff0000;
      transform: rotate(90deg);
      letter-spacing: 4px;
      z-index: 3;
    }

    .sticker-2 {
      top: 420px;
      left: -2px;
      font-size: 60px;
      color: rgba(0,0,0,0.03);
      transform: rotate(-90deg);
      transform-origin: left top;
      letter-spacing: -2px;
    }

    /* スクロールバー */
    .phone-frame::-webkit-scrollbar { width: 6px; }
    .phone-frame::-webkit-scrollbar-thumb { background: #ff0000; }
    .phone-frame::-webkit-scrollbar-track { background: #fff; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="container">

      <!-- 装飾ステッカー -->
      <div class="sticker sticker-1">SYSTEM</div>
      <div class="sticker sticker-2">DECIDE</div>

      <!-- ヒーロー -->
      <div class="hero">
        <div class="tape">v1.0 — ACTIVE</div>
        <div class="oversize">
          MO<span class="gi">GI</span>
        </div>
        <div class="sub">DECISION / MAKING / SYSTEM</div>
      </div>

      <!-- キャッチ -->
      <div class="catch-block">
        <div class="bg-text">GAL</div>
        <div class="catchcopy">
          「<span class="gal">GAL</span>が5人で<br>会議したらこうなる。」
        </div>
      </div>

      <!-- メンバー -->
      <div class="section-label">
        <span>MEMBERS</span>
        <span class="count">05 UNITS</span>
      </div>
      <div class="char-stack">
        <div class="char-card">
          <span class="char-sym">♥</span>
          <div class="char-name">モカ</div>
          <div class="char-role">Moe Core</div>
        </div>
        <div class="char-card">
          <span class="char-sym">⚗</span>
          <div class="char-name">リツ</div>
          <div class="char-role">Tech Core</div>
        </div>
        <div class="char-card">
          <span class="char-sym">◇</span>
          <div class="char-name">カノン</div>
          <div class="char-role">Guard</div>
        </div>
        <div class="char-card">
          <span class="char-sym">♛</span>
          <div class="char-name">レイカ</div>
          <div class="char-role">Chair</div>
        </div>
        <div class="char-card">
          <span class="char-sym">★</span>
          <div class="char-name">ルナ</div>
          <div class="char-role">GAL</div>
        </div>
      </div>

      <!-- シナリオ -->
      <div class="section-label">
        <span>SCENARIOS</span>
        <span class="count">03 CASES</span>
      </div>
      <div class="scenario-section">
        <div class="scenario-list">
          <div class="scenario-card">
            <div class="scenario-num">01</div>
            <div class="scenario-text">副業でAIサービスを始めるべき？</div>
            <div class="scenario-arrow">→</div>
          </div>
          <div class="scenario-card">
            <div class="scenario-num">02</div>
            <div class="scenario-text">社内データをClaude APIに渡していい？</div>
            <div class="scenario-arrow">→</div>
          </div>
          <div class="scenario-card">
            <div class="scenario-num">03</div>
            <div class="scenario-text">勉強会をYouTubeで公開配信すべき？</div>
            <div class="scenario-arrow">→</div>
          </div>
        </div>
      </div>

      <!-- フッター -->
      <div class="footer-raw">
        <span>MO-GI/<span class="red">SYS</span></span>
        <span>2025</span>
        <span class="red">■■■</span>
      </div>

    </div>
  </div>
</body>
</html>
